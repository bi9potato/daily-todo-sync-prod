name: iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-ipa.yml"
      - ".npmrc"
      - "apps/mobile/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: write

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_PUBLIC_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL || 'https://68.183.180.19.sslip.io/api' }}
  EXPO_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
  EXPO_PUBLIC_BUILD_SHA: ${{ github.sha }}

jobs:
  build:
    name: Build unsigned iOS IPA
    # macOS runners are required for Xcode. They bill at 10x Linux minutes, so
    # this workflow is intentionally path-filtered to mobile changes only.
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Use npmjs registry in GitHub Actions
        run: pnpm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate iOS project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform ios --no-install

      - name: Restore CocoaPods cache
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ios-pods-v1-${{ runner.os }}-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: |
            ios-pods-v1-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build unsigned archive
        working-directory: apps/mobile/ios
        run: |
          set -euo pipefail
          workspace="$(ls -d *.xcworkspace | head -n1)"
          # Expo names the app scheme after the workspace, so the scheme is the
          # workspace filename without its extension (avoids picking a Pods
          # scheme from xcodebuild -list).
          scheme="$(basename "${workspace}" .xcworkspace)"
          echo "Archiving workspace=${workspace} scheme=${scheme}"
          xcodebuild \
            -workspace "${workspace}" \
            -scheme "${scheme}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "${PWD}/build/DailyTodo.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        working-directory: apps/mobile/ios
        run: |
          set -euo pipefail
          app="$(ls -d build/DailyTodo.xcarchive/Products/Applications/*.app | head -n1)"
          rm -rf Payload
          mkdir -p Payload
          cp -R "${app}" Payload/
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          /usr/bin/zip -r -y "${GITHUB_WORKSPACE}/artifacts/daily-todo.ipa" Payload
          shasum -a 256 "${GITHUB_WORKSPACE}/artifacts/daily-todo.ipa" \
            > "${GITHUB_WORKSPACE}/artifacts/daily-todo.ipa.sha256"
          version_name="$(node -p "require('${GITHUB_WORKSPACE}/apps/mobile/package.json').version")"
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > "${GITHUB_WORKSPACE}/artifacts/daily-todo-ios-update.json" <<EOF
          {
            "versionName": "${version_name}",
            "buildNumber": ${{ github.run_number }},
            "buildSha": "${GITHUB_SHA}",
            "signing": "unsigned",
            "ipaUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/ios-latest/daily-todo.ipa",
            "releaseUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/ios-latest",
            "publishedAt": "${published_at}"
          }
          EOF

      - name: Upload installable IPA
        uses: actions/upload-artifact@v4
        with:
          name: daily-todo-ios-unsigned
          path: |
            artifacts/daily-todo.ipa
            artifacts/daily-todo.ipa.sha256
            artifacts/daily-todo-ios-update.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Publish latest iOS test release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ios-latest
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true > /dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" > /dev/null
          fi

          {
            echo "Automated **unsigned** iOS test build from \`main\`."
            echo
            echo "- Commit: [${GITHUB_SHA::7}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
            echo "- Signing: none — install with SideStore/AltStore, which re-signs with your own free Apple ID."
            echo "- See \`apps/mobile/docs/ios-sideload.md\` for install steps and the 7-day / 3-app free-account limits."
          } > release-notes.md

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Latest iOS Test Build" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${RELEASE_TAG}" \
              --title "Latest iOS Test Build" \
              --notes-file release-notes.md \
              --prerelease
          fi

          gh release upload "${RELEASE_TAG}" \
            artifacts/daily-todo.ipa \
            artifacts/daily-todo.ipa.sha256 \
            artifacts/daily-todo-ios-update.json \
            --clobber

      - name: Add download instructions
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### iOS test IPA (unsigned)"
            echo
            echo "Download from the [Latest iOS Test Build release](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/ios-latest)."
            echo
            echo "Direct IPA: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/ios-latest/daily-todo.ipa"
            echo
            echo "> Unsigned build for internal testing. Install via SideStore/AltStore with a free Apple ID (re-signs on device; 7-day refresh, max 3 sideloaded apps)."
          } >> "$GITHUB_STEP_SUMMARY"
