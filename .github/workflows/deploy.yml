name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/daily-todo-sync-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/daily-todo-sync-web
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build and deploy
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          source: "compose.yml,infra/Caddyfile"
          target: "/opt/daily-todo-sync"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/daily-todo-sync
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            IMAGE_TAG="${{ env.IMAGE_TAG }}" docker compose -f compose.yml pull
            docker compose -f compose.yml stop api || true
            if ! IMAGE_TAG="${{ env.IMAGE_TAG }}" docker compose -f compose.yml run --rm api python manage.py migrate; then
              IMAGE_TAG="${{ env.IMAGE_TAG }}" docker compose -f compose.yml up -d api
              exit 1
            fi
            IMAGE_TAG="${{ env.IMAGE_TAG }}" docker compose -f compose.yml up -d
            IMAGE_TAG="${{ env.IMAGE_TAG }}" docker compose -f compose.yml ps
