name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - ".npmrc"
      - "apps/mobile/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_FAST_ANDROID_BUILD: "1"
  EXPO_PUBLIC_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL || 'https://68.183.180.19.sslip.io/api' }}
  EXPO_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
  EXPO_PUBLIC_BUILD_SHA: ${{ github.sha }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_NOHASHDIR: "true"
  CCACHE_SLOPPINESS: file_stat_matches,include_file_ctime,include_file_mtime,time_macros
  CMAKE_C_COMPILER_LAUNCHER: ccache
  CMAKE_CXX_COMPILER_LAUNCHER: ccache

jobs:
  build:
    name: Build standalone arm64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Use npmjs registry in GitHub Actions
        run: pnpm config set registry https://registry.npmjs.org/

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success
          cache-read-only: ${{ github.event_name != 'workflow_dispatch' }}
          add-job-summary: on-failure

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      # Typecheck/lint/doctor are intentionally covered by the CI workflow.
      # Keep this release workflow focused on producing the APK quickly.
      - name: Restore generated Android project
        id: android-project-cache
        uses: actions/cache/restore@v4
        with:
          path: apps/mobile/android
          key: android-prebuild-v1-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}

      - name: Generate Android project
        if: steps.android-project-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @daily-todo-sync/mobile exec expo prebuild --platform android --clean --no-install

      - name: Prepare Android project
        run: |
          # Expo prebuild currently generates a Gradle 9.x wrapper, but the
          # bundled Foojay toolchain resolver still references a vendor
          # constant removed from Gradle 9. Keep the ephemeral native project on
          # the latest Gradle 8 line until Expo updates that plugin.
          sed -i 's#gradle-[0-9.]*-bin.zip#gradle-8.14.3-bin.zip#' \
            apps/mobile/android/gradle/wrapper/gradle-wrapper.properties

          # The generated native project is cached across commits. Keep the
          # build-number-sensitive versionCode current when reusing it.
          version_code="${EXPO_PUBLIC_BUILD_NUMBER:-1}"
          if grep -qE 'versionCode [0-9]+' apps/mobile/android/app/build.gradle; then
            sed -i "s/versionCode [0-9][0-9]*/versionCode ${version_code}/" \
              apps/mobile/android/app/build.gradle
          else
            grep -n "versionCode" apps/mobile/android/app/build.gradle
          fi

      - name: Save generated Android project
        if: steps.android-project-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: apps/mobile/android
          key: android-prebuild-v1-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}

      - name: Restore Android incremental outputs
        id: android-incremental-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/mobile/android/.gradle
            apps/mobile/android/app/build
            apps/mobile/android/app/.cxx
            apps/mobile/android/build
            node_modules/.pnpm/**/android/.cxx
          key: android-incremental-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}-${{ github.run_id }}
          restore-keys: |
            android-incremental-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}-

      - name: Restore native compiler cache
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: android-ccache-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}-${{ github.run_id }}
          restore-keys: |
            android-ccache-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}-

      - name: Enable native compiler cache
        run: |
          if ! command -v ccache > /dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ccache
          fi
          ccache --set-config=base_dir="${CCACHE_BASEDIR}"
          ccache --set-config=compiler_check="${CCACHE_COMPILERCHECK}"
          ccache --set-config=hash_dir=false
          ccache --set-config=max_size="${CCACHE_MAXSIZE}"
          ccache --set-config=sloppiness="${CCACHE_SLOPPINESS}"
          ccache --zero-stats

      - name: Restore stable internal signing key
        uses: actions/cache@v4
        with:
          path: apps/mobile/android/app/debug.keystore
          key: android-internal-signing-v1

      - name: Build standalone arm64 APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -x lintVitalAnalyzeRelease \
            -x lintVitalReportRelease \
            -x lintVitalRelease \
            --build-cache \
            --parallel \
            --no-daemon \
            --stacktrace
          ccache --show-stats

      - name: Save Android incremental outputs
        if: success()
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            apps/mobile/android/.gradle
            apps/mobile/android/app/build
            apps/mobile/android/app/.cxx
            apps/mobile/android/build
            node_modules/.pnpm/**/android/.cxx
          key: android-incremental-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}-${{ github.run_id }}

      - name: Save native compiler cache
        if: success()
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .ccache
          key: android-ccache-v2-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.ts') }}-${{ github.run_id }}

      - name: Prepare artifact and checksum
        run: |
          mkdir -p artifacts
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk artifacts/daily-todo-arm64-v8a.apk
          sha256sum artifacts/daily-todo-arm64-v8a.apk > artifacts/daily-todo-arm64-v8a.apk.sha256
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          version_name="$(node -p "require('./apps/mobile/package.json').version")"
          cat > artifacts/daily-todo-android-update.json <<EOF
          {
            "versionName": "${version_name}",
            "versionCode": ${{ github.run_number }},
            "buildSha": "${GITHUB_SHA}",
            "architecture": "arm64-v8a",
            "apkUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/android-latest/daily-todo-arm64-v8a.apk",
            "releaseUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/android-latest",
            "publishedAt": "${published_at}"
          }
          EOF

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-todo-android-arm64-v8a
          path: |
            artifacts/daily-todo-arm64-v8a.apk
            artifacts/daily-todo-arm64-v8a.apk.sha256
            artifacts/daily-todo-android-update.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Publish latest Android test release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: android-latest
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true > /dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" > /dev/null
          fi

          {
            echo "Automated Android test build from \`main\`."
            echo
            echo "- Commit: [${GITHUB_SHA::7}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
            echo "- Architecture: \`arm64-v8a\`"
            echo "- Signing: test key (internal testing only)"
          } > release-notes.md

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Latest Android Test Build" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${RELEASE_TAG}" \
              --title "Latest Android Test Build" \
              --notes-file release-notes.md \
              --prerelease
          fi

          gh release upload "${RELEASE_TAG}" \
            artifacts/daily-todo-arm64-v8a.apk \
            artifacts/daily-todo-arm64-v8a.apk.sha256 \
            artifacts/daily-todo-android-update.json \
            --clobber

      - name: Copy update manifest to server
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          source: "artifacts/daily-todo-android-update.json"
          target: "/opt/daily-todo-sync"

      - name: Publish update manifest
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/daily-todo-sync
            docker compose -f compose.yml exec -T api mkdir -p /app/media/mobile
            docker compose -f compose.yml cp \
              artifacts/daily-todo-android-update.json \
              api:/app/media/mobile/android-latest.json

      - name: Add download instructions
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### Android test APK"
            echo
            echo "Download the APK directly from the [Latest Android Test Build release](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/android-latest)."
            echo
            echo "Direct APK: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/android-latest/daily-todo-arm64-v8a.apk"
            echo
            echo "> This is a standalone, test-signed arm64-v8a APK for internal testing, not a Play Store release."
          } >> "$GITHUB_STEP_SUMMARY"
