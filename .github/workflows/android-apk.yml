name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - ".npmrc"
      - "apps/mobile/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  # Publishing uses one mutable android-latest release. Let queued builds finish
  # in order so an older run cannot race a newer run while replacing its tag
  # and assets.
  cancel-in-progress: false

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_FAST_ANDROID_BUILD: "1"
  EXPO_PUBLIC_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL || 'https://68.183.180.19.sslip.io/api' }}
  EXPO_PUBLIC_BUILD_SHA: ${{ github.sha }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 2G
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_NOHASHDIR: "true"
  CCACHE_SLOPPINESS: file_stat_matches,include_file_ctime,include_file_mtime,time_macros
  CMAKE_C_COMPILER_LAUNCHER: ccache
  CMAKE_CXX_COMPILER_LAUNCHER: ccache

jobs:
  build:
    name: Build standalone arm64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set Android version code
        run: |
          # Devices already have builds from the old private repository, whose
          # run counter was higher. Keep the +200 offset in the real APK config;
          # repack-app reads this value when rewriting AndroidManifest.xml.
          echo "EXPO_PUBLIC_BUILD_NUMBER=$((GITHUB_RUN_NUMBER + 200))" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Use npmjs registry in GitHub Actions
        run: pnpm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate Android native fingerprint
        id: native-fingerprint
        working-directory: apps/mobile
        run: |
          native_hash="$(
            pnpm exec fingerprint fingerprint:generate --platform android |
              jq -er '.hash'
          )"
          echo "hash=${native_hash}" >> "$GITHUB_OUTPUT"

      # A matching native fingerprint means only JavaScript, bundled assets, or
      # app metadata changed. Repacking avoids the entire Gradle/native toolchain.
      - name: Restore reusable native APK
        id: native-base-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/daily-todo-native-base
          key: android-native-base-v2-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}

      - name: Repack JavaScript-only APK
        if: steps.native-base-cache.outputs.cache-hit == 'true'
        working-directory: apps/mobile
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          pnpm exec repack-app \
            --platform android \
            --source-app "${RUNNER_TEMP}/daily-todo-native-base/base.apk" \
            --output "${GITHUB_WORKSPACE}/artifacts/daily-todo-arm64-v8a.apk" \
            --ks "${RUNNER_TEMP}/daily-todo-native-base/debug.keystore" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --ks-key-pass pass:android

      - name: Set up Gradle cache
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          add-job-summary: on-failure

      # Typecheck/lint/doctor are intentionally covered by the CI workflow.
      # Keep this release workflow focused on producing the APK quickly.
      - name: Restore generated Android project
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        id: android-project-cache
        uses: actions/cache/restore@v4
        with:
          path: apps/mobile/android
          key: android-prebuild-v2-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}

      - name: Generate Android project
        if: steps.native-base-cache.outputs.cache-hit != 'true' && steps.android-project-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @daily-todo-sync/mobile exec expo prebuild --platform android --clean --no-install

      - name: Prepare Android project
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        run: |
          # Expo prebuild currently generates a Gradle 9.x wrapper, but the
          # bundled Foojay toolchain resolver still references a vendor
          # constant removed from Gradle 9. Keep the ephemeral native project on
          # the latest Gradle 8 line until Expo updates that plugin.
          sed -i 's#gradle-[0-9.]*-bin.zip#gradle-8.14.3-bin.zip#' \
            apps/mobile/android/gradle/wrapper/gradle-wrapper.properties

          # The generated native project is cached across commits. Keep the
          # build-number-sensitive versionCode current when reusing it.
          # +200 offset: this repo's run numbers restart from 1 after the
          # prod/ops split, but devices may already have a build installed
          # with a versionCode from the old repo (which reached 102) --
          # Android refuses to install an APK with a lower versionCode than
          # what's already on the device.
          version_code="${EXPO_PUBLIC_BUILD_NUMBER:-1}"
          if grep -qE 'versionCode [0-9]+' apps/mobile/android/app/build.gradle; then
            sed -i "s/versionCode [0-9][0-9]*/versionCode ${version_code}/" \
              apps/mobile/android/app/build.gradle
          else
            grep -n "versionCode" apps/mobile/android/app/build.gradle
          fi

      - name: Save generated Android project
        if: steps.native-base-cache.outputs.cache-hit != 'true' && steps.android-project-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: apps/mobile/android
          key: android-prebuild-v2-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}

      - name: Restore Android incremental outputs
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        id: android-incremental-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/mobile/android/.gradle
            apps/mobile/android/app/build
            apps/mobile/android/app/.cxx
            apps/mobile/android/build
            node_modules/.pnpm/**/android/.cxx
          key: android-incremental-v3-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}-${{ github.run_id }}
          restore-keys: |
            android-incremental-v3-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}-
            android-incremental-v3-${{ runner.os }}-
            android-incremental-v2-${{ runner.os }}-

      - name: Restore native compiler cache
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: android-ccache-v3-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}-${{ github.run_id }}
          restore-keys: |
            android-ccache-v3-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}-
            android-ccache-v3-${{ runner.os }}-
            android-ccache-v2-${{ runner.os }}-

      - name: Enable native compiler cache
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        run: |
          if ! command -v ccache > /dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ccache
          fi
          ccache --set-config=base_dir="${CCACHE_BASEDIR}"
          ccache --set-config=compiler_check="${CCACHE_COMPILERCHECK}"
          ccache --set-config=hash_dir=false
          ccache --set-config=max_size="${CCACHE_MAXSIZE}"
          ccache --set-config=sloppiness="${CCACHE_SLOPPINESS}"
          ccache --zero-stats

      - name: Restore stable internal signing key
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: apps/mobile/android/app/debug.keystore
          key: android-internal-signing-v1

      - name: Build standalone arm64 APK
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :macrobenchmark:assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -x lintVitalAnalyzeRelease \
            -x lintVitalReportRelease \
            -x lintVitalRelease \
            --build-cache \
            --parallel \
            --no-daemon \
            --stacktrace
          ccache --show-stats

      - name: Stage reusable native APK
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${RUNNER_TEMP}/daily-todo-native-base"
          cp \
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "${RUNNER_TEMP}/daily-todo-native-base/base.apk"
          cp \
            apps/mobile/android/app/debug.keystore \
            "${RUNNER_TEMP}/daily-todo-native-base/debug.keystore"

      - name: Save reusable native APK
        if: steps.native-base-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/daily-todo-native-base
          key: android-native-base-v2-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}

      - name: Save Android incremental outputs
        if: success() && steps.native-base-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            apps/mobile/android/.gradle
            apps/mobile/android/app/build
            apps/mobile/android/app/.cxx
            apps/mobile/android/build
            node_modules/.pnpm/**/android/.cxx
          key: android-incremental-v3-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}-${{ github.run_id }}

      - name: Save native compiler cache
        if: success() && steps.native-base-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .ccache
          key: android-ccache-v3-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}-${{ github.run_id }}

      - name: Prepare artifact and checksum
        run: |
          mkdir -p artifacts
          if [[ "${{ steps.native-base-cache.outputs.cache-hit }}" != "true" ]]; then
            cp \
              apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
              artifacts/daily-todo-arm64-v8a.apk
          fi
          sha256sum artifacts/daily-todo-arm64-v8a.apk > artifacts/daily-todo-arm64-v8a.apk.sha256
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          version_name="$(node -p "require('./apps/mobile/package.json').version")"
          version_code="${EXPO_PUBLIC_BUILD_NUMBER}"
          aapt_path="$(find "${ANDROID_HOME}/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          apk_version_code="$(
            "${aapt_path}" dump badging artifacts/daily-todo-arm64-v8a.apk |
              sed -n "s/^package:.*versionCode='\([0-9][0-9]*\)'.*/\1/p"
          )"
          apk_package="$(
            "${aapt_path}" dump badging artifacts/daily-todo-arm64-v8a.apk |
              sed -n "s/^package: name='\([^']*\)'.*/\1/p"
          )"
          if [[ -z "${apk_version_code}" || "${apk_version_code}" != "${version_code}" ]]; then
            echo "APK versionCode ${apk_version_code:-missing} does not match manifest ${version_code}" >&2
            exit 1
          fi
          if [[ "${apk_package}" != "com.dailytodosync.app" ]]; then
            echo "Unexpected APK package ${apk_package:-missing}" >&2
            exit 1
          fi
          apksigner_path="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          cert_output="$(
            "${apksigner_path}" verify --print-certs artifacts/daily-todo-arm64-v8a.apk
          )"
          signing_cert_sha256="$(
            printf '%s\n' "${cert_output}" |
              sed -n '/certificate SHA-256 digest:/Ip' |
              head -n 1 |
              sed 's/.*: //' |
              tr -d ':' |
              tr 'A-F' 'a-f'
          )"
          if [[ ! "${signing_cert_sha256}" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "Could not read APK signing certificate SHA-256" >&2
            printf '%s\n' "${cert_output}" >&2
            exit 1
          fi
          apk_sha256="$(sha256sum artifacts/daily-todo-arm64-v8a.apk | cut -d' ' -f1)"
          apk_size_bytes="$(stat -c '%s' artifacts/daily-todo-arm64-v8a.apk)"
          # apkUrl points at the app server, not the GitHub release asset:
          # 62MB downloads from GitHub truncate routinely on mainland-China
          # networks, failing install with Android's generic "app not
          # installed". Specifically at Caddy's /downloads file_server (not
          # the Django API), because only it honors Range requests - without
          # resume support an interrupted mobile download corrupts and still
          # fails to install. Deployment copies the APK into the shared
          # media volume alongside this manifest.
          cat > artifacts/daily-todo-android-update.json <<EOF
          {
            "versionName": "${version_name}",
            "versionCode": ${version_code},
            "buildSha": "${GITHUB_SHA}",
            "architecture": "arm64-v8a",
            "packageName": "${apk_package}",
            "apkSizeBytes": ${apk_size_bytes},
            "apkSha256": "${apk_sha256}",
            "signingCertificateSha256": "${signing_cert_sha256}",
            "verificationStatus": "verified",
            "releaseNotes": "Android reliability, diagnostics, navigation, and daily overview improvements.",
            "apkUrl": "${EXPO_PUBLIC_API_BASE_URL%/api}/downloads/daily-todo-arm64-v8a.apk",
            "releaseUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/android-latest",
            "publishedAt": "${published_at}"
          }
          EOF

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-todo-android-arm64-v8a
          path: |
            artifacts/daily-todo-arm64-v8a.apk
            artifacts/daily-todo-arm64-v8a.apk.sha256
            artifacts/daily-todo-android-update.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Publish latest Android test release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: android-latest
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true > /dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" > /dev/null
          fi

          {
            echo "Automated Android test build from \`main\`."
            echo
            echo "- Commit: [${GITHUB_SHA::7}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
            echo "- Architecture: \`arm64-v8a\`"
            echo "- Signing: test key (internal testing only)"
          } > release-notes.md

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Latest Android Test Build" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${RELEASE_TAG}" \
              --title "Latest Android Test Build" \
              --notes-file release-notes.md \
              --prerelease
          fi

          gh release upload "${RELEASE_TAG}" \
            artifacts/daily-todo-arm64-v8a.apk \
            artifacts/daily-todo-arm64-v8a.apk.sha256 \
            artifacts/daily-todo-android-update.json \
            --clobber

      - name: Add download instructions
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### Android test APK"
            echo
            echo "Download the APK directly from the [Latest Android Test Build release](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/android-latest)."
            echo
            echo "Direct APK: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/android-latest/daily-todo-arm64-v8a.apk"
            echo
            echo "> This is a standalone, test-signed arm64-v8a APK for internal testing, not a Play Store release."
          } >> "$GITHUB_STEP_SUMMARY"
