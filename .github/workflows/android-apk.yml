name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  EXPO_NO_TELEMETRY: "1"
  EXPO_PUBLIC_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL || 'https://68.183.180.19.sslip.io/api' }}

jobs:
  build:
    name: Build standalone arm64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck mobile app
        run: pnpm check:mobile

      - name: Lint mobile app
        run: pnpm --filter @daily-todo-sync/mobile lint

      - name: Validate Expo project
        run: pnpm --dir apps/mobile run doctor

      - name: Generate Android project
        run: pnpm --filter @daily-todo-sync/mobile exec expo prebuild --platform android --clean

      - name: Build standalone arm64 APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --build-cache \
            --no-daemon \
            --stacktrace

      - name: Prepare artifact and checksum
        run: |
          mkdir -p artifacts
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk artifacts/daily-todo-arm64-v8a.apk
          sha256sum artifacts/daily-todo-arm64-v8a.apk > artifacts/daily-todo-arm64-v8a.apk.sha256

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-todo-android-arm64-v8a
          path: |
            artifacts/daily-todo-arm64-v8a.apk
            artifacts/daily-todo-arm64-v8a.apk.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Publish latest Android test release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: android-latest
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true > /dev/null
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" > /dev/null
          fi

          {
            echo "Automated Android test build from \`main\`."
            echo
            echo "- Commit: [${GITHUB_SHA::7}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
            echo "- Architecture: \`arm64-v8a\`"
            echo "- Signing: test key (internal testing only)"
          } > release-notes.md

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Latest Android Test Build" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${RELEASE_TAG}" \
              --title "Latest Android Test Build" \
              --notes-file release-notes.md \
              --prerelease
          fi

          gh release upload "${RELEASE_TAG}" \
            artifacts/daily-todo-arm64-v8a.apk \
            artifacts/daily-todo-arm64-v8a.apk.sha256 \
            --clobber

      - name: Add download instructions
        run: |
          {
            echo "### Android test APK"
            echo
            echo "Download the APK directly from the [Latest Android Test Build release](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/android-latest)."
            echo
            echo "Direct APK: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/android-latest/daily-todo-arm64-v8a.apk"
            echo
            echo "> This is a standalone, test-signed arm64-v8a APK for internal testing, not a Play Store release."
          } >> "$GITHUB_STEP_SUMMARY"
