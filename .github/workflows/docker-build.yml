name: Android API Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/daily-todo-sync-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push Android API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=android-api
          cache-to: type=gha,mode=max,scope=android-api

