name: Android API Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/daily-todo-sync-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push Android API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t "${API_IMAGE}:${IMAGE_TAG}" \
            -t "${API_IMAGE}:latest" \
            .
          docker push "${API_IMAGE}:${IMAGE_TAG}"
          docker push "${API_IMAGE}:latest"

